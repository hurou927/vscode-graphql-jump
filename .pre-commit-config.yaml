repos:
  - repo: local
    hooks:
      - id: oxlint
        name: oxlint
        entry: npx oxlint src
        language: node
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false

      - id: oxfmt
        name: oxfmt
        entry: npx oxfmt --check src
        language: node
        types_or: [javascript, jsx, ts, tsx]
        pass_filenames: false
